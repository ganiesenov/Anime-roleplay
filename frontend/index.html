<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleplay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14110f;
    --bg-raised: #1d1916;
    --bg-input: #251f1b;
    --ink: #ece3d6;
    --ink-dim: #9a8d7d;
    --accent: #d97742;
    --accent-soft: #3a2419;
    --char-bubble: #221d19;
    --user-bubble: #2d2620;
    --border: #2f2823;
    --danger: #b5503f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Fraunces', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    overflow: hidden;
    background-image: radial-gradient(circle at 15% 10%, #1f1815 0%, transparent 40%),
                      radial-gradient(circle at 85% 90%, #1a1512 0%, transparent 45%);
  }
  .app { display: flex; height: 100vh; }

  /* ---- sidebar ---- */
  .sidebar {
    width: 280px;
    background: var(--bg-raised);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .brand {
    padding: 22px 22px 16px;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    border-bottom: 1px solid var(--border);
  }
  .brand span { color: var(--accent); font-style: italic; }
  .char-list { flex: 1; overflow-y: auto; padding: 10px; }
  .char-card {
    padding: 13px 15px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 6px;
    border: 1px solid transparent;
    transition: all .18s ease;
  }
  .char-card:hover { background: var(--bg-input); }
  .char-card.active { background: var(--accent-soft); border-color: var(--accent); }
  .char-card .name { font-size: 17px; font-weight: 600; }
  .char-card .tags { font-size: 12px; color: var(--ink-dim); margin-top: 3px; font-family: 'Spline Sans Mono', monospace; }
  .sidebar-actions { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .btn {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 13px;
    padding: 9px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--ink);
    cursor: pointer;
    transition: all .15s ease;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); color: #1a120c; border-color: var(--accent); font-weight: 500; }
  .btn.primary:hover { filter: brightness(1.08); color: #1a120c; }
  .btn.flex { flex: 1; }

  /* ---- main chat ---- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-header {
    padding: 16px 26px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(20,17,15,0.6);
    backdrop-filter: blur(8px);
  }
  .chat-header .title { font-size: 21px; font-weight: 600; }
  .chat-header .status { font-family: 'Spline Sans Mono', monospace; font-size: 12px; color: var(--ink-dim); }
  .chat-header .status.ok { color: #7fae6b; }
  .chat-header .status.bad { color: var(--danger); }

  .messages { flex: 1; overflow-y: auto; padding: 28px 26px; display: flex; flex-direction: column; gap: 18px; }
  .msg { max-width: 74%; display: flex; flex-direction: column; gap: 5px; animation: rise .35s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .msg .who { font-family: 'Spline Sans Mono', monospace; font-size: 11px; color: var(--ink-dim); letter-spacing: .04em; text-transform: uppercase; }
  .msg .bubble { padding: 14px 18px; border-radius: 14px; font-size: 17px; line-height: 1.55; white-space: pre-wrap; }
  .msg.char { align-self: flex-start; }
  .msg.char .bubble { background: var(--char-bubble); border-top-left-radius: 4px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.user .bubble { background: var(--user-bubble); border-top-right-radius: 4px; }
  .msg .bubble.typing { color: var(--ink-dim); font-style: italic; }

  .empty-state { margin: auto; text-align: center; color: var(--ink-dim); max-width: 420px; }
  .empty-state h2 { font-size: 28px; font-weight: 400; font-style: italic; margin-bottom: 12px; color: var(--ink); }
  .empty-state p { font-size: 15px; line-height: 1.6; }

  .composer { padding: 18px 26px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-end; }
  .composer textarea {
    flex: 1;
    resize: none;
    font-family: 'Fraunces', serif;
    font-size: 16px;
    background: var(--bg-input);
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    max-height: 160px;
    line-height: 1.5;
  }
  .composer textarea:focus { outline: none; border-color: var(--accent); }
  .composer textarea::placeholder { color: var(--ink-dim); }

  /* ---- modal (editor) ---- */
  .overlay { position: fixed; inset: 0; background: rgba(10,8,7,0.78); display: none; align-items: center; justify-content: center; z-index: 50; backdrop-filter: blur(3px); }
  .overlay.show { display: flex; }
  .modal {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 600px;
    max-width: 92vw;
    max-height: 88vh;
    overflow-y: auto;
    padding: 26px;
  }
  .modal h2 { font-size: 24px; font-weight: 600; margin-bottom: 20px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-family: 'Spline Sans Mono', monospace; font-size: 12px; color: var(--ink-dim); margin-bottom: 6px; letter-spacing: .03em; }
  .field input, .field textarea {
    width: 100%;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    background: var(--bg-input);
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 13px;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 64px; }
  .field .hint { font-size: 12px; color: var(--ink-dim); margin-top: 4px; font-style: italic; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

  ::-webkit-scrollbar { width: 9px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3d352e; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">role<span>play</span></div>
    <div class="char-list" id="charList"></div>
    <div class="sidebar-actions">
      <button class="btn primary flex" onclick="openEditor()">+ Персонаж</button>
    </div>
  </aside>

  <main class="main">
    <div class="chat-header">
      <div>
        <div class="title" id="chatTitle">Roleplay</div>
      </div>
      <div class="status" id="status">проверка…</div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state">
        <h2>Выбери персонажа</h2>
        <p>Создай нового через «+ Персонаж» или выбери из списка слева, чтобы начать диалог.</p>
      </div>
    </div>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Напиши сообщение…" disabled></textarea>
      <button class="btn primary" id="sendBtn" onclick="send()" disabled>→</button>
    </div>
  </main>
</div>

<!-- editor modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="editorTitle">Новый персонаж</h2>
    <input type="hidden" id="f_id">
    <div class="field">
      <label>Имя</label>
      <input id="f_name" placeholder="Напр. Кацуки Бакуго">
    </div>
    <div class="field">
      <label>Описание (личность, манера речи, внешность)</label>
      <textarea id="f_description" rows="4" placeholder="Кто этот персонаж. 500–1000 слов даёт лучший результат."></textarea>
      <div class="hint">Самое важное поле. Используй {{char}} и {{user}} как плейсхолдеры.</div>
    </div>
    <div class="field">
      <label>Сцена / контекст</label>
      <textarea id="f_scenario" rows="2" placeholder="Где и при каких обстоятельствах происходит разговор."></textarea>
    </div>
    <div class="field">
      <label>Приветствие (первое сообщение персонажа)</label>
      <textarea id="f_first_mes" rows="2" placeholder="С чего персонаж начинает диалог."></textarea>
    </div>
    <div class="field">
      <label>Примеры диалога</label>
      <textarea id="f_mes_example" rows="3" placeholder="<START>&#10;{{user}}: привет&#10;{{char}}: ну привет, чего надо"></textarea>
      <div class="hint">Формат: блоки через &lt;START&gt;, строки {{user}}: … и {{char}}: …</div>
    </div>
    <div class="field">
      <label>Системные инструкции (опционально)</label>
      <textarea id="f_system_prompt" rows="2" placeholder="Напр. Пиши короткими репликами. Не выходи из роли."></textarea>
    </div>
    <div class="field">
      <label>Теги (через запятую)</label>
      <input id="f_tags" placeholder="anime, tsundere, fantasy">
    </div>
    <div class="modal-actions">
      <button class="btn" id="deleteBtn" onclick="deleteChar()" style="margin-right:auto;display:none">Удалить</button>
      <button class="btn" onclick="closeEditor()">Отмена</button>
      <button class="btn primary" onclick="saveChar()">Сохранить</button>
    </div>
  </div>
</div>

<script>
const API = ""; // тот же origin
let characters = [];
let current = null;     // активная карточка (полная)
let history = [];       // [{role, content}]

// ---------- init ----------
async function init() {
  checkHealth();
  await loadCharacters();
  autoGrow(document.getElementById('input'));
}

async function checkHealth() {
  const el = document.getElementById('status');
  try {
    const r = await fetch(`${API}/api/health`);
    const d = await r.json();
    if (d.model_present) { el.textContent = `● ${d.model.split(':')[0]}`; el.className = 'status ok'; }
    else if (d.provider === 'ollama' && d.available_models) {
      el.textContent = '● модель не найдена в ollama'; el.className = 'status bad';
    } else { el.textContent = `● ${d.status || d.provider}`; el.className = 'status'; }
  } catch (e) {
    el.textContent = '● бэкенд недоступен'; el.className = 'status bad';
  }
}

async function loadCharacters() {
  const r = await fetch(`${API}/api/characters`);
  characters = await r.json();
  renderList();
}

function renderList() {
  const list = document.getElementById('charList');
  if (!characters.length) {
    list.innerHTML = `<div style="padding:16px;color:var(--ink-dim);font-size:14px;font-style:italic">Пока нет персонажей.</div>`;
    return;
  }
  list.innerHTML = characters.map(c => `
    <div class="char-card ${current && current.id===c.id ? 'active':''}" onclick="selectChar('${c.id}')">
      <div class="name">${esc(c.name)}</div>
      ${c.tags && c.tags.length ? `<div class="tags">${c.tags.map(esc).join(' · ')}</div>` : ''}
    </div>`).join('');
}

// ---------- chat ----------
async function selectChar(id) {
  const r = await fetch(`${API}/api/characters/${id}`);
  current = await r.json();
  history = [];
  document.getElementById('chatTitle').textContent = current.name;
  document.getElementById('input').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  renderList();
  renderMessages();
  if (current.first_mes) {
    history.push({role:'assistant', content: current.first_mes});
    renderMessages();
  }
}

function renderMessages() {
  const box = document.getElementById('messages');
  if (!current) return;
  if (!history.length) {
    box.innerHTML = `<div class="empty-state"><h2>${esc(current.name)}</h2><p>Начни разговор — напиши первое сообщение.</p></div>`;
    return;
  }
  box.innerHTML = history.map(m => `
    <div class="msg ${m.role==='assistant'?'char':'user'}">
      <div class="who">${m.role==='assistant'? esc(current.name) : 'ты'}</div>
      <div class="bubble">${esc(m.content)}</div>
    </div>`).join('');
  box.scrollTop = box.scrollHeight;
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !current) return;
  input.value = ''; autoGrow(input);

  history.push({role:'user', content:text});
  renderMessages();

  // typing placeholder
  const box = document.getElementById('messages');
  const typing = document.createElement('div');
  typing.className = 'msg char';
  typing.innerHTML = `<div class="who">${esc(current.name)}</div><div class="bubble typing">…</div>`;
  box.appendChild(typing); box.scrollTop = box.scrollHeight;

  document.getElementById('sendBtn').disabled = true;
  try {
    const r = await fetch(`${API}/api/chat`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        character_id: current.id,
        message: text,
        history: history.slice(0, -1),  // без только что добавленного
      })
    });
    const d = await r.json();
    typing.remove();
    history.push({role:'assistant', content: d.reply || '(пустой ответ)'});
    renderMessages();
  } catch (e) {
    typing.querySelector('.bubble').textContent = 'Ошибка: ' + e.message;
  } finally {
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

// ---------- editor ----------
function openEditor(card) {
  document.getElementById('overlay').classList.add('show');
  document.getElementById('editorTitle').textContent = card ? 'Редактировать' : 'Новый персонаж';
  document.getElementById('deleteBtn').style.display = card ? 'block' : 'none';
  const f = (id,v='') => document.getElementById(id).value = v;
  f('f_id', card?.id || '');
  f('f_name', card?.name || '');
  f('f_description', card?.description || '');
  f('f_scenario', card?.scenario || '');
  f('f_first_mes', card?.first_mes || '');
  f('f_mes_example', card?.mes_example || '');
  f('f_system_prompt', card?.system_prompt || '');
  f('f_tags', (card?.tags || []).join(', '));
}
function closeEditor() { document.getElementById('overlay').classList.remove('show'); }

async function saveChar() {
  const g = id => document.getElementById(id).value.trim();
  const name = g('f_name');
  if (!name) { alert('Имя обязательно'); return; }
  const card = {
    id: g('f_id') || undefined,
    name,
    description: g('f_description'),
    scenario: g('f_scenario'),
    first_mes: g('f_first_mes'),
    mes_example: g('f_mes_example'),
    system_prompt: g('f_system_prompt'),
    tags: g('f_tags').split(',').map(s=>s.trim()).filter(Boolean),
  };
  // сохраняем lorebook текущей карточки, если редактируем (фаза 2 правит его отдельно)
  if (card.id && current && current.id === card.id) card.lorebook = current.lorebook || [];
  const r = await fetch(`${API}/api/characters`, {
    method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(card)
  });
  const saved = await r.json();
  closeEditor();
  await loadCharacters();
  if (current && current.id === saved.id) selectChar(saved.id);
}

async function deleteChar() {
  const id = document.getElementById('f_id').value;
  if (!id || !confirm('Удалить персонажа?')) return;
  await fetch(`${API}/api/characters/${id}`, {method:'DELETE'});
  if (current && current.id === id) { current = null; history = []; document.getElementById('chatTitle').textContent='Roleplay'; renderMessages(); }
  closeEditor();
  await loadCharacters();
}

// double-click персонажа в списке → редактор (через активную карточку)
document.getElementById('charList').addEventListener('dblclick', async (e) => {
  const cardEl = e.target.closest('.char-card');
  if (!cardEl) return;
  const id = cardEl.getAttribute('onclick').match(/'([^']+)'/)[1];
  const r = await fetch(`${API}/api/characters/${id}`);
  openEditor(await r.json());
});

// ---------- utils ----------
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function autoGrow(t){ t.style.height='auto'; t.style.height=Math.min(t.scrollHeight,160)+'px'; }
document.getElementById('input').addEventListener('input', e=>autoGrow(e.target));
document.getElementById('input').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
});

init();
</script>
</body>
</html>
