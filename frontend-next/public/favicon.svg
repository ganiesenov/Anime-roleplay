<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d3527"/>
      <stop offset="1" stop-color="#05100b"/>
    </linearGradient>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5cffc4"/>
      <stop offset="1" stop-color="#1ba97a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#5cffc4" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#5cffc4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- squircle tile -->
  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#tile)"/>
  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#glow)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="17.25" fill="none" stroke="#2ee6a0" stroke-opacity="0.4"/>
  <!-- speech-bubble tail -->
  <path d="M20 47 l0 9 l10 -7.5 z" fill="url(#a)"/>
  <!-- geometric A monogram -->
  <path d="M32 13 L47 51 H39.6 L36.9 43.6 H27.1 L24.4 51 H17 Z M29.3 36.9 H34.7 L32 28.6 Z"
        fill="url(#a)"/>
  <!-- crossbar cut -->
  <rect x="27.6" y="38.4" width="8.8" height="2.4" rx="1.2" fill="#05100b" opacity="0.55"/>
  <!-- orbiting spark -->
  <circle cx="46.5" cy="17.5" r="3" fill="#ffd952"/>
  <circle cx="46.5" cy="17.5" r="6" fill="none" stroke="#ffd952" stroke-opacity="0.35" stroke-width="1.2"/>
</svg>
